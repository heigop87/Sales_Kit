dius: 999px;\n    background: linear-gradient(90deg, #4aa6ff 0%, #6bc8ff 30%, #f4a83a 60%, #ef4444 100%);\n  }\n  .ws-slider input[type=\"range\"]::-webkit-slider-thumb {\n    -webkit-appearance: none;\n    appearance: none;\n    width: 22px; height: 22px;\n    border-radius: 50%;\n    background: #fff;\n    border: 3px solid #4a2c8a;\n    margin-top: -7px;\n    cursor: pointer;\n    box-shadow: 0 2px 6px rgba(0,0,0,.4);\n  }\n  .ws-slider input[type=\"range\"]::-moz-range-thumb {\n    width: 22px; height: 22px;\n    border-radius: 50%;\n    background: #fff;\n    border: 3px solid #4a2c8a;\n    cursor: pointer;\n  }\n  .ws-stops {\n    display: grid;\n    grid-template-columns: 1fr 1fr 1fr;\n    font-family: \"Figtree\", monospace;\n    font-size: 11px;\n    letter-spacing: .08em;\n    text-transform: uppercase;\n    color: rgba(255,255,255,.5);\n    margin-top: 4px;\n  }\n  .ws-stops span:first-child { text-align: left; }\n  .ws-stops span:last-child  { text-align: right; }\n\n  .iq-desc {\n    font-family: \"Figtree\", monospace;\n    font-size: 11px;\n    letter-spacing: .08em;\n    color: rgba(255,255,255,.55);\n    margin-top: 2px;\n    line-height: 1.4;\n  }\n  details.iq-legend {\n    margin-top: 12px;\n    border: 1px dashed rgba(255,255,255,.10);\n    border-radius: 10px;\n    font-family: \"Figtree\", system-ui, sans-serif;\n    color: rgba(255,255,255,.55);\n  }\n  details.iq-legend > summary {\n    list-style: none;\n    cursor: pointer;\n    padding: 10px 14px;\n    display: flex;\n    align-items: center;\n    gap: 8px;\n    font-size: 12px;\n    letter-spacing: .04em;\n    color: rgba(255,255,255,.7);\n    user-select: none;\n  }\n  details.iq-legend > summary::-webkit-details-marker { display: none; }\n  details.iq-legend > summary::before {\n    content: \"▸\";\n    color: rgba(255,255,255,.5);\n    font-size: 10px;\n    transition: transform .15s;\n    display: inline-block;\n  }\n  details.iq-legend[open] > summary::before {\n    transform: rotate(90deg);\n  }\n  details.iq-legend > summary:hover { color: rgba(255,255,255,.9); }\n  details.iq-legend > .iq-legend-body {\n    padding: 4px 14px 14px;\n    display: grid;\n    gap: 6px;\n    font-size: 12px;\n    line-height: 1.45;\n    color: rgba(255,255,255,.55);\n  }\n  details.iq-legend > .iq-legend-body strong {\n    color: rgba(255,255,255,.85); font-weight: 600;\n  }\n\n  /* Logo upload */\n  .logo-zone {\n    position: relative;\n    display: flex;\n    align-items: center;\n    gap: 16px;\n    padding: 16px;\n    background: rgba(255,255,255,.03);\n    border: 1px dashed rgba(255,255,255,.25);\n    border-radius: 14px;\n    cursor: pointer;\n    transition: border-color .15s, background .15s;\n  }\n  .logo-zone:hover {\n    border-color: rgba(182,157,232,.6);\n    background: rgba(182,157,232,.06);\n  }\n  .logo-zone.has-file {\n    border-style: solid;\n    border-color: rgba(182,157,232,.4);\n    background: rgba(182,157,232,.06);\n  }\n  .logo-zone input[type=\"file\"] {\n    position: absolute;\n    inset: 0;\n    opacity: 0;\n    cursor: pointer;\n  }\n  .logo-preview {\n    flex: 0 0 80px;\n    width: 80px;\n    height: 80px;\n    border-radius: 10px;\n    background: rgba(255,255,255,.04);\n    display: grid;\n    place-items: center;\n    overflow: hidden;\n  }\n  .logo-preview img,\n  .logo-preview object {\n    max-width: 70px;\n    max-height: 70px;\n    width: auto;\n    height: auto;\n    object-fit: contain;\n  }\n  .logo-preview .placeholder {\n    font-family: \"Figtree\", monospace;\n    font-size: 11px;\n    letter-spacing: .14em;\n    color: rgba(255,255,255,.35);\n    text-transform: uppercase;\n  }\n  .logo-meta {\n    flex: 1;\n    min-width: 0;\n  }\n  .logo-meta .lname {\n    font-size: 16px;\n    color: #fff;\n    margin-bottom: 4px;\n    font-weight: 500;\n    overflow: hidden;\n    white-space: nowrap;\n    text-overflow: ellipsis;\n  }\n  .logo-meta .lname.empty { color: rgba(255,255,255,.55); font-weight: 400; }\n  .logo-meta .lhint {\n    font-size: 13px;\n    color: rgba(255,255,255,.45);\n  }\n\n  .actions {\n    padding-top: 28px;\n    border-top: 1px solid rgba(255,255,255,.10);\n    display: flex;\n    flex-direction: column;\n    gap: 12px;\n  }\n  .btn {\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    gap: 10px;\n    padding: 16px 24px;\n    border-radius: 12px;\n    border: 1px solid transparent;\n    font-family: \"Poppins\", system-ui, sans-serif;\n    font-size: 16px;\n    font-weight: 600;\n    letter-spacing: -.01em;\n    cursor: pointer;\n    transition: filter .15s, background .15s, border-color .15s;\n  }\n  .btn-primary {\n    background: linear-gradient(90deg, #4A2C8A, #6F45C4);\n    color: #fff;\n    border-color: rgba(182,157,232,.4);\n  }\n  .btn-primary:hover { filter: brightness(1.1); }\n  .btn-secondary {\n    background: rgba(255,255,255,.06);\n    color: rgba(255,255,255,.85);\n    border-color: rgba(255,255,255,.18);\n  }\n  .btn-secondary:hover {\n    background: rgba(255,255,255,.10);\n    border-color: rgba(255,255,255,.28);\n  }\n\n  /* Saved presets */\n  .presets {\n    margin-top: 28px;\n    padding-top: 22px;\n    border-top: 1px solid rgba(255,255,255,.10);\n  }\n  .presets-title {\n    font-family: \"Figtree\", monospace;\n    font-size: 11px;\n    letter-spacing: .14em;\n    text-transform: uppercase;\n    color: rgba(255,255,255,.5);\n    margin-bottom: 12px;\n    font-weight: 600;\n  }\n  .preset-list {\n    display: flex;\n    flex-wrap: wrap;\n    gap: 8px;\n  }\n  .preset-pill {\n    padding: 8px 14px;\n    background: rgba(255,255,255,.04);\n    border: 1px solid rgba(255,255,255,.14);\n    border-radius: 999px;\n    font-size: 13px;\n    color: rgba(255,255,255,.78);\n    cursor: pointer;\n    transition: background .15s, color .15s;\n    position: relative;\n  }\n  .preset-pill:hover {\n    background: rgba(182,157,232,.12);\n    color: #fff;\n  }\n  .preset-pill .x {\n    margin-left: 8px;\n    color: rgba(255,255,255,.35);\n    font-size: 14px;\n  }\n  .preset-pill .x:hover { color: #ff7a59; }\n\n  @media (max-width: 1100px) {\n    .stage { grid-template-columns: 1fr; gap: 32px; }\n    .intro { position: static; padding-top: 0; }\n    h1 { font-size: 42px; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- Client-side auth gate. Hides the form behind a username/password screen.\n     Credentials hardcoded below — anyone with view-source can bypass, so this\n     is a soft deterrent, not real security. -->\n<style>\n  body:not(.authed) > .stage { display: none !important; }\n  body:not(.authed) #login-gate { display: flex; }\n  body.authed #login-gate { display: none; }\n\n  #login-gate {\n    position: fixed; inset: 0;\n    display: flex; align-items: center; justify-content: center;\n    padding: 24px;\n    z-index: 9999;\n    background:\n      radial-gradient(circle at 20% 0%, rgba(111,69,196,.25), transparent 60%),\n      linear-gradient(160deg, #1a0d33 0%, #110826 40%, #0a0a0c 100%);\n  }\n  .login-card {\n    width: 100%; max-width: 420px;\n    padding: 36px 36px 32px;\n    background: linear-gradient(160deg, rgba(26,13,51,.7) 0%, rgba(10,10,12,.9) 100%);\n    border: 1px solid rgba(255,255,255,.10);\n    border-radius: 18px;\n    box-shadow: 0 24px 60px rgba(0,0,0,.4);\n    color: #fff;\n    font-family: \"Figtree\", system-ui, sans-serif;\n  }\n  .login-card .brand {\n    font-family: \"Poppins\", system-ui, sans-serif;\n    font-weight: 700;\n    font-size: 22px;\n    letter-spacing: -.01em;\n    margin-bottom: 4px;\n  }\n  .login-card .brand-lockup {\n    display: flex; align-items: center; gap: 14px;\n    margin-bottom: 28px;\n    padding-bottom: 22px;\n    border-bottom: 1px solid rgba(255,255,255,.10);\n  }\n  .login-card .brand-lockup img {\n    height: 28px; width: auto; display: block;\n  }\n  .login-card .brand-lockup .brand-label {\n    font-family: \"Figtree\", monospace;\n    font-size: 12px;\n    font-weight: 600;\n    letter-spacing: .14em;\n    text-transform: uppercase;\n    color: rgba(255,255,255,.78);\n    padding-left: 14px;\n    border-left: 1px solid rgba(255,255,255,.15);\n  }\n  .login-card .sub {\n    font-family: \"Figtree\", monospace;\n    font-size: 12px;\n    letter-spacing: .12em;\n    text-transform: uppercase;\n    color: rgba(255,255,255,.6);\n    margin-bottom: 28px;\n  }\n  .login-card label {\n    display: block;\n    font-family: \"Figtree\", monospace;\n    font-size: 12px;\n    letter-spacing: .12em;\n    text-transform: uppercase;\n    color: rgba(255,255,255,.78);\n    margin-bottom: 8px;\n    font-weight: 600;\n  }\n  .login-card input {\n    width: 100%;\n    padding: 14px 16px;\n    background: rgba(255,255,255,.04);\n    border: 1px solid rgba(255,255,255,.14);\n    border-radius: 12px;\n    color: #fff;\n    font-family: \"Figtree\", system-ui, sans-serif;\n    font-size: 16px;\n    margin-bottom: 18px;\n    transition: border-color .15s, background .15s;\n  }\n  .login-card input:focus {\n    outline: none;\n    border-color: rgba(111,69,196,.55);\n    background: rgba(255,255,255,.06);\n  }\n  .login-card button {\n    appearance: none;\n    width: 100%;\n    padding: 14px 18px;\n    background: linear-gradient(90deg, #4A2C8A, #6F45C4);\n    color: #fff;\n    border: 0;\n    border-radius: 12px;\n    font-family: \"Figtree\", system-ui, sans-serif;\n    font-size: 15px;\n    font-weight: 700;\n    letter-spacing: .02em;\n    cursor: pointer;\n    margin-top: 6px;\n    transition: filter .15s;\n  }\n  .login-card button:hover { filter: brightness(1.12); }\n  .login-card .err {\n    margin-top: 14px;\n    font-size: 13px;\n    color: #ff9b80;\n    min-height: 18px;\n    text-align: center;\n  }\n\n  body.authed #logout-btn { display: inline-flex; }\n  body:not(.authed) #logout-btn { display: none; }\n  #logout-btn {\n    position: fixed;\n    top: 20px; right: 24px;\n    z-index: 9000;\n    align-items: center; gap: 8px;\n    padding: 9px 14px;\n    background: rgba(255,255,255,.05);\n    border: 1px solid rgba(255,255,255,.14);\n    border-radius: 999px;\n    color: rgba(255,255,255,.78);\n    font-family: \"Figtree\", monospace;\n    font-size: 12px;\n    letter-spacing: .12em;\n    text-transform: uppercase;\n    font-weight: 600;\n    cursor: pointer;\n    transition: color .15s, background .15s, border-color .15s;\n  }\n  #logout-btn:hover {\n    color: #fff;\n    background: rgba(111,69,196,.18);\n    border-color: rgba(111,69,196,.55);\n  }\n  #logout-btn .ico { font-size: 14px; line-height: 1; }\n<\u002Fstyle>\n\n<button type=\"button\" id=\"logout-btn\" title=\"Sign out\">\n  <span class=\"ico\">↪<\u002Fspan>\n  <span>Sign out<\u002Fspan>\n<\u002Fbutton>\n\n<div id=\"login-gate\" role=\"dialog\" aria-modal=\"true\" aria-label=\"Sign in\">\n  <form class=\"login-card\" id=\"login-form\" autocomplete=\"off\">\n    <div class=\"brand-lockup\">\n      <img src=\"6b6a26b3-a2e8-462e-9766-61f07f21d5aa\" alt=\"YachtWay\">\n      <span class=\"brand-label\">Sales Toolkit<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"sub\">Sign in to continue<\u002Fdiv>\n\n    <label for=\"login-user\">Username<\u002Flabel>\n    <input type=\"text\" id=\"login-user\" autocomplete=\"off\" autofocus=\"\">\n\n    <label for=\"login-pass\">Password<\u002Flabel>\n    <input type=\"password\" id=\"login-pass\" autocomplete=\"off\">\n\n    <button type=\"submit\">Sign in →<\u002Fbutton>\n    <div class=\"err\" id=\"login-err\"><\u002Fdiv>\n  <\u002Fform>\n<\u002Fdiv>\n\n<script>\n  (function () {\n    // Hardcoded; client-side soft gate, not real auth.\n    const USER = 'Snowflake';\n    const PASS = 'ProjectTakeover';\n    const KEY  = 'yw-sales-authed';\n\n    if (sessionStorage.getItem(KEY) === '1') {\n      document.body.classList.add('authed');\n    }\n\n    const form = document.getElementById('login-form');\n    const userEl = document.getElementById('login-user');\n    const passEl = document.getElementById('login-pass');\n    const errEl  = document.getElementById('login-err');\n\n    form.addEventListener('submit', (e) => {\n      e.preventDefault();\n      const u = userEl.value.trim();\n      const p = passEl.value;\n      if (u === USER && p === PASS) {\n        sessionStorage.setItem(KEY, '1');\n        document.body.classList.add('authed');\n        errEl.textContent = '';\n      } else {\n        errEl.textContent = 'Incorrect username or password.';\n        passEl.value = '';\n        passEl.focus();\n      }\n    });\n\n    // Wire the floating Sign out button.\n    const logoutBtn = document.getElementById('logout-btn');\n    if (logoutBtn) {\n      logoutBtn.addEventListener('click', () => {\n        sessionStorage.removeItem(KEY);\n        document.body.classList.remove('authed');\n        userEl.value = '';\n        passEl.value = '';\n        userEl.focus();\n      });\n    }\n  })();\n<\u002Fscript>\n\n<div class=\"stage\">\n  <!-- Left: intro -->\n  <div class=\"intro\">\n    <div class=\"brand\">\n      <img src=\"6b6a26b3-a2e8-462e-9766-61f07f21d5aa\" alt=\"YachtWay\">\n      <span class=\"brand-label\">Sales Toolkit<\u002Fspan>\n    <\u002Fdiv>\n    <h1>Personalize the <em>presentation.<\u002Fem><\u002Fh1>\n    <p><strong>You are YachtWay in the room.<\u002Fstrong> This is the first impression every future customer gets of the company, and it is how the world will judge you as a professional. A personalized pitch wins a generic showdown every single time. Five minutes here saves the meeting, do not shortcut your own pitch.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- Right: form -->\n  <div class=\"card\">\n    <div class=\"card-title\" id=\"card-title\">Dealer / Brokerage details<\u002Fdiv>\n\n    <form id=\"config-form\">\n      <div class=\"field-group\">\n        <label>Region<\u002Flabel>\n        <div class=\"seg\" id=\"seg-region\" role=\"tablist\">\n          <button type=\"button\" data-val=\"us\" aria-pressed=\"true\">United States · USD<\u002Fbutton>\n          <button type=\"button\" data-val=\"eu\" aria-pressed=\"false\">Europe · EUR<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"field-group\">\n        <label>Account type<\u002Flabel>\n        <div class=\"seg\" id=\"seg-persona\" role=\"tablist\">\n          <button type=\"button\" data-val=\"dealer\" aria-pressed=\"true\">Dealership / Brokerage<\u002Fbutton>\n          <button type=\"button\" data-val=\"shipyard\" aria-pressed=\"false\">Shipyard<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"field-group span-full\">\n        <label id=\"logo-label\">Dealer logo · white on transparent · SVG or PNG <span style=\"color:#ff9b80;font-weight:700;\">· MANDATORY<\u002Fspan><\u002Flabel>\n        <div class=\"logo-zone\" id=\"logo-zone\">\n          <input type=\"file\" id=\"logo-input\" accept=\".svg,.png,.jpg,.jpeg,.webp\">\n          <div class=\"logo-preview\" id=\"logo-preview\">\n            <span class=\"placeholder\">Logo<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"logo-meta\">\n            <div class=\"lname empty\" id=\"logo-name\">Click or drop a file...<\u002Fdiv>\n            <div class=\"lhint\">Grab it from their website footer / press kit, or Google \"[dealer name] logo PNG\". SVG preferred · transparent background · white fill<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"field-group\">\n        <label id=\"name-label\">Dealer name <span style=\"color:#ff9b80;font-weight:700;\">· MANDATORY<\u002Fspan><\u002Flabel>\n        <input type=\"text\" id=\"dealer-name\" placeholder=\"QWERTY Yachts\" required=\"\">\n        <input type=\"hidden\" id=\"dealer-short\">\n      <\u002Fdiv>\n\n      <!-- State (US) / country (EU). Shown for both dealers and shipyards. -->\n      <div class=\"field-group span-full\" id=\"state-field\" style=\"display:block;\">\n        <label id=\"state-label\">Dealer location · state <span style=\"color:#ff9b80;font-weight:700;\">· MANDATORY<\u002Fspan><\u002Flabel>\n        <select id=\"dealer-state\">\n          <option value=\"\">Select state...<\u002Foption>\n          <option value=\"FL\">Florida<\u002Foption>\n          <option value=\"CA\">California<\u002Foption>\n          <option value=\"TX\">Texas<\u002Foption>\n          <option value=\"NY\">New York<\u002Foption>\n          <option value=\"CT\">Connecticut<\u002Foption>\n          <option value=\"MA\">Massachusetts<\u002Foption>\n          <option value=\"MD\">Maryland<\u002Foption>\n          <option value=\"NJ\">New Jersey<\u002Foption>\n          <option value=\"NC\">North Carolina<\u002Foption>\n          <option value=\"SC\">South Carolina<\u002Foption>\n          <option value=\"GA\">Georgia<\u002Foption>\n          <option value=\"AL\">Alabama<\u002Foption>\n          <option value=\"LA\">Louisiana<\u002Foption>\n          <option value=\"TN\">Tennessee<\u002Foption>\n          <option value=\"WA\">Washington<\u002Foption>\n          <option value=\"OR\">Oregon<\u002Foption>\n          <option value=\"AZ\">Arizona<\u002Foption>\n          <option value=\"NV\">Nevada<\u002Foption>\n          <option value=\"MI\">Michigan<\u002Foption>\n          <option value=\"OTHER\">Other US state<\u002Foption>\n        <\u002Fselect>\n        <div id=\"state-hint\" style=\"font-size:12px;color:rgba(255,255,255,.4);margin-top:6px;line-height:1.4;\">\n          South Florida dealers get the YachtWay Studio pitch slide. Other states skip it.\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Dealer-only: authorized dealer flag (unlocks the Authorized Dealers slide) -->\n      <div class=\"field-group span-full\" id=\"dealer-fields\" style=\"display:block;\">\n        <label>Account category <span style=\"color:#ff9b80;font-weight:700;\">· MANDATORY<\u002Fspan><\u002Flabel>\n        <div class=\"seg\" id=\"seg-dealer-type\" role=\"tablist\">\n          <button type=\"button\" data-val=\"brokerage\" aria-pressed=\"true\">Brokerage<\u002Fbutton>\n          <button type=\"button\" data-val=\"authorized\" aria-pressed=\"false\">Authorized dealer for a brand<\u002Fbutton>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n\n      <!-- Shipyard-only: distribution model -->\n      <div class=\"field-group span-full\" id=\"shipyard-fields\" style=\"display:none;\">\n        <label>Distribution model<\u002Flabel>\n        <div class=\"seg\" id=\"seg-distribution\" role=\"tablist\">\n          <button type=\"button\" data-val=\"factory\" aria-pressed=\"true\">Factory direct<\u002Fbutton>\n          <button type=\"button\" data-val=\"dealer-network\" aria-pressed=\"false\">Dealer network<\u002Fbutton>\n        <\u002Fdiv>\n        <div id=\"dealers-row\" style=\"display:none; margin-top:12px;\">\n          <input type=\"number\" id=\"dealer-count\" placeholder=\"How many dealers in the network?\" min=\"0\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Branded lineup (shipyards + authorized dealers).\n           Sales person enters how many brands; we render that many name inputs. -->\n      <div class=\"field-group span-full\" id=\"brand-list-wrap\" style=\"display:none;\">\n        <div class=\"brand-stepper\">\n          <label for=\"brand-count\" id=\"brand-count-label\">How many brands?<\u002Flabel>\n          <div class=\"stepper\">\n            <button type=\"button\" class=\"step-btn\" id=\"brand-minus\" aria-label=\"Decrease\">−<\u002Fbutton>\n            <input type=\"text\" inputmode=\"numeric\" pattern=\"[0-9]*\" id=\"brand-count\" maxlength=\"2\" placeholder=\"0\">\n            <button type=\"button\" class=\"step-btn\" id=\"brand-plus\" aria-label=\"Increase\">+<\u002Fbutton>\n          <\u002Fdiv>\n          <span class=\"step-hint\">Up to 10<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"brand-list\" id=\"brand-list\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"field-group\">\n        <label>Primary attendee <span style=\"color:#ff9b80;font-weight:700;\">· MANDATORY<\u002Fspan><\u002Flabel>\n        <div style=\"font-size:13px;color:rgba(255,255,255,.65);margin: -4px 0 12px;line-height:1.5;\">\n          This is <strong style=\"color:#fff;\">the person you are giving the presentation to<\u002Fstrong>. The decision-maker on the other side of the table. We use their name to personalize the cover and the close.\n        <\u002Fdiv>\n        <div class=\"row-3\" style=\"grid-template-columns: 1fr 1fr;\">\n          <input type=\"text\" id=\"attendee-first\" placeholder=\"First name\" required=\"\">\n          <input type=\"text\" id=\"attendee-last\" placeholder=\"Last name\" required=\"\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"field-group span-full\">\n        <label>Your pitch line <span style=\"color:#ff9b80;font-weight:700;\">· MUST BE UNIQUE FOR THIS PRESENTATION<\u002Fspan><\u002Flabel>\n        <input type=\"text\" id=\"cover-line\" maxlength=\"80\" placeholder=\"e.g. Maximum visibility in the top search results.\">\n        <div style=\"display:flex;justify-content:space-between;margin-top:6px;font-size:12px;color:rgba(255,255,255,.4);line-height:1.4;\">\n          <span>Tailor it to this dealer, no recycled pitches.<\u002Fspan>\n          <span id=\"cover-line-counter\" style=\"font-family:'Figtree',monospace;letter-spacing:.06em;\">0 / 80<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"field-group span-full\">\n        <label>Presenter <span style=\"color:#ff9b80;font-weight:700;\">· MANDATORY<\u002Fspan><\u002Flabel>\n        <div class=\"row-3\" style=\"grid-template-columns: 1fr 1.2fr;\">\n          <input type=\"text\" id=\"presenter-name\" placeholder=\"Name (e.g. Adam)\">\n          <input type=\"text\" id=\"presenter-title\" placeholder=\"Title (e.g. Sales Manager)\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"field-group span-full\">\n        <label><span id=\"unit-label\">Team &amp; sites<\u002Fspan> · for monthly estimate<\u002Flabel>\n        <div class=\"row-3\" id=\"team-row\">\n          <div class=\"num-cell\">\n            <label for=\"price-brokers\">Brokers<\u002Flabel>\n            <div class=\"stepper\">\n              <button type=\"button\" class=\"step-btn\" data-step=\"price-brokers\" data-dir=\"-1\" aria-label=\"Decrease\">−<\u002Fbutton>\n              <input type=\"text\" inputmode=\"numeric\" pattern=\"[0-9]*\" id=\"price-brokers\" placeholder=\"0\" maxlength=\"3\">\n              <button type=\"button\" class=\"step-btn\" data-step=\"price-brokers\" data-dir=\"1\" aria-label=\"Increase\">+<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"num-cell\">\n            <label for=\"price-managers\">Managers<\u002Flabel>\n            <div class=\"stepper\">\n              <button type=\"button\" class=\"step-btn\" data-step=\"price-managers\" data-dir=\"-1\" aria-label=\"Decrease\">−<\u002Fbutton>\n              <input type=\"text\" inputmode=\"numeric\" pattern=\"[0-9]*\" id=\"price-managers\" placeholder=\"0\" maxlength=\"3\">\n              <button type=\"button\" class=\"step-btn\" data-step=\"price-managers\" data-dir=\"1\" aria-label=\"Increase\">+<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div id=\"units-cell\" class=\"num-cell\">\n            <label for=\"price-units\" id=\"units-label\">Offices<\u002Flabel>\n            <div class=\"stepper\">\n              <button type=\"button\" class=\"step-btn\" data-step=\"price-units\" data-dir=\"-1\" aria-label=\"Decrease\">−<\u002Fbutton>\n              <input type=\"text\" inputmode=\"numeric\" pattern=\"[0-9]*\" id=\"price-units\" placeholder=\"0\" maxlength=\"3\">\n              <button type=\"button\" class=\"step-btn\" data-step=\"price-units\" data-dir=\"1\" aria-label=\"Increase\">+<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"field-group span-full\">\n        <label>Add-ons<\u002Flabel>\n        <div class=\"addons\" id=\"addons\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"pricing\" id=\"pricing\">\n        <div class=\"pricing-head\">\n          <span class=\"lbl\">Estimated YachtWay monthly<\u002Fspan>\n          <span class=\"total\" id=\"price-total\">$0<span class=\"per\">/mo<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n        <div id=\"price-lines\"><\u002Fdiv>\n        <div class=\"pricing-foot\">\n          <span id=\"price-annual\">$0 / year<\u002Fspan>\n          <span><strong id=\"price-region\">US<\u002Fstrong> · <span id=\"price-persona\">Dealership<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Dealer-only: website rubric. Score the dealer's current site\n           on a 0–10 scale (we include the redesign slide if < 6) and\n           drop in a homepage screenshot for the side-by-side. -->\n      <div class=\"field-group dealer-only span-full\" id=\"website-field\" style=\"display:block;\">\n        <label>Their current website · score &amp; screenshot<\u002Flabel>\n\n        <div class=\"ws-slider\">\n          <div class=\"ws-score-line\">\n            <div class=\"ws-score-num\" id=\"ws-readout-num\">5<\u002Fdiv>\n            <div class=\"ws-score-meta\">\n              <div class=\"ws-readout\" id=\"ws-readout\">Cool<\u002Fdiv>\n              <div class=\"iq-desc\" id=\"ws-desc\">Has a feed but feels dated, slow, or hard to navigate on mobile.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <input type=\"range\" id=\"website-score\" min=\"0\" max=\"10\" step=\"1\" value=\"5\">\n          <div class=\"ws-stops\">\n            <span>0 · Freezing<\u002Fspan>\n            <span style=\"text-align:center;color:rgba(255,255,255,.5);\">5<\u002Fspan>\n            <span>10 · Ultra Hot<\u002Fspan>\n          <\u002Fdiv>\n          <details class=\"iq-legend\">\n            <summary>See the rating guide<\u002Fsummary>\n            <div class=\"iq-legend-body\">\n              <div><strong>0–1 Freezing:<\u002Fstrong> no website at all, or a single page with phone and email only.<\u002Fdiv>\n              <div><strong>2–3 Cold:<\u002Fstrong> has a site but no listing feed, just a contact form. Looks dated.<\u002Fdiv>\n              <div><strong>4–6 Cool / Warm:<\u002Fstrong> has a basic feed, but slow, dated layout, poor mobile experience.<\u002Fdiv>\n              <div><strong>7–8 Hot:<\u002Fstrong> modern site with working inventory feed, decent mobile, average UX.<\u002Fdiv>\n              <div><strong>9–10 Ultra Hot:<\u002Fstrong> professional, fast, mobile-first, clean buyer experience throughout.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdetails>\n        <\u002Fdiv>\n\n        <div class=\"website-url-row\">\n          <label for=\"website-url\" class=\"url-lbl\">Website URL<\u002Flabel>\n          <input type=\"url\" id=\"website-url\" placeholder=\"https://qwertyyachts.com\">\n        <\u002Fdiv>\n\n        <div class=\"logo-zone\" id=\"screenshot-zone\" style=\"margin-top:14px;\">\n          <input type=\"file\" id=\"screenshot-input\" accept=\".png,.jpg,.jpeg,.webp\">\n          <div class=\"logo-preview\" id=\"screenshot-preview\" style=\"flex: 0 0 120px; width: 120px; height: 80px; border-radius: 8px;\">\n            <span class=\"placeholder\">Site<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"logo-info\">\n            <div class=\"logo-title\" id=\"screenshot-name\">Drop a homepage screenshot here <span style=\"color:#ff9b80;font-weight:700;font-size:12px;\">· MANDATORY<\u002Fspan><\u002Fdiv>\n            <div class=\"logo-hint\">PNG or JPG · always required, regardless of score<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Inventory follow-up. Determines whether the API pitch slide\n             gets injected: no inventory → show; BoatsGroup feed → show\n             (we want them off BoatsGroup); their own feed → skip. -->\n        <div class=\"inv-q\">\n          <div class=\"inv-q-row\">\n            <div class=\"inv-q-label\">Does the dealer have inventory on their website?<\u002Fdiv>\n            <div class=\"seg seg-mini\" id=\"seg-has-inv\" role=\"tablist\">\n              <button type=\"button\" data-val=\"no\" aria-pressed=\"true\">No<\u002Fbutton>\n              <button type=\"button\" data-val=\"yes\" aria-pressed=\"false\">Yes<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"inv-q-row\" id=\"inv-feed-row\" style=\"display:none;\">\n            <div class=\"inv-q-label\">Is it a BoatsGroup API feed?<\u002Fdiv>\n            <div class=\"seg seg-mini\" id=\"seg-inv-feed\" role=\"tablist\">\n              <button type=\"button\" data-val=\"other\" aria-pressed=\"true\">Own / other feed<\u002Fbutton>\n              <button type=\"button\" data-val=\"boatsgroup\" aria-pressed=\"false\">BoatsGroup<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Image quality rubric (dealer-only). Sales person rates the\n           current cover-photo quality on their listings. Low scores\n           trigger a harder Studio pitch and unlock the AI Enhance slide. -->\n      <div class=\"field-group dealer-only span-full\" id=\"image-quality-field\" style=\"display:block;\">\n        <label>Their listing image quality <span style=\"color:rgba(255,255,255,.4);font-weight:500;font-size:11px;letter-spacing:.10em;\">· OPEN A LISTING, JUDGE THE COVER PHOTO<\u002Fspan><\u002Flabel>\n        <div class=\"ws-slider\">\n          <div class=\"ws-score-line\">\n            <div class=\"ws-score-num\" id=\"iq-readout-num\">5<\u002Fdiv>\n            <div class=\"ws-score-meta\">\n              <div class=\"ws-readout\" id=\"iq-readout\">Decent<\u002Fdiv>\n              <div class=\"iq-desc\" id=\"iq-desc\">In the open water, clearly amateur, but passable for a basic listing.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <input type=\"range\" id=\"image-quality\" min=\"0\" max=\"10\" step=\"1\" value=\"5\">\n          <div class=\"ws-stops\">\n            <span>0 · Very bad<\u002Fspan>\n            <span style=\"text-align:center;color:rgba(255,255,255,.5);\">5<\u002Fspan>\n            <span>10 · Studio quality<\u002Fspan>\n          <\u002Fdiv>\n          <details class=\"iq-legend\">\n            <summary>See the rating guide<\u002Fsummary>\n            <div class=\"iq-legend-body\">\n              <div><strong>0–1 Very bad:<\u002Fstrong> boat on a trailer, in a marina, covers still on.<\u002Fdiv>\n              <div><strong>2–3 Bad:<\u002Fstrong> pixelated, low resolution, poorly lit interiors, fenders dangling.<\u002Fdiv>\n              <div><strong>4–6 Average:<\u002Fstrong> open water, clearly amateur, passes a basic listing.<\u002Fdiv>\n              <div><strong>7–8 Good:<\u002Fstrong> sharp, well-lit, mostly clean compositions.<\u002Fdiv>\n              <div><strong>9–10 Studio:<\u002Fstrong> full pro shoot, running shots, proper editing, well-staged interiors.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdetails>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Central listings count. Sales person must check the dealer's site\n           for their featured/central listings number. Required for all dealers. -->\n      <div class=\"field-group dealer-only span-full\" id=\"central-listings-field\" style=\"display:block;\">\n        <label>Central listings on their site <span style=\"color:#ff9b80;font-weight:700;\">· MANDATORY · LOOK ON THEIR HOMEPAGE<\u002Fspan><\u002Flabel>\n        <div class=\"cl-card\">\n          <div class=\"cl-body\">\n            <div class=\"cl-hint\" style=\"font-size: 16px\">Look for the dealer's featured / central listings count&nbsp;&nbsp;only&nbsp;&nbsp;on their site.<\u002Fdiv>\n            <div class=\"cl-input-row\">\n              <input type=\"number\" id=\"central-listings\" min=\"0\" max=\"99999\" placeholder=\"e.g. 247\">\n              <span class=\"cl-suffix\">central listings<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"actions\">\n        <button type=\"button\" class=\"btn btn-primary\" id=\"open-deck\">\n          Open presentation →\n        <\u002Fbutton>\n        <button type=\"button\" class=\"btn btn-secondary\" id=\"copy-link\" title=\"Copy a personalized link — open later or share with yourself\">\n          🔗 Copy share link\n        <\u002Fbutton>\n        <button type=\"button\" class=\"btn btn-secondary\" id=\"save-pdf\" title=\"Open the deck and trigger print → Save as PDF\">\n          ⬇ Save as PDF\n        <\u002Fbutton>\n        <div id=\"link-feedback\" style=\"flex-basis:100%;font-family:'Figtree',monospace;font-size:11px;letter-spacing:.08em;color:rgba(255,255,255,.5);margin-top:4px;min-height:14px;\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fform>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<script>\n(function () {\n  const STORAGE_KEY = 'yw-preset';\n  const HISTORY_KEY = 'yw-preset-history';\n\n  const $ = (id) => document.getElementById(id);\n\n  // ── Pricing matrix, pulled from the YachtWay configurator (us/eu × dealer/shipyard).\n  // null means \"not offered in this region\" → shown as unavailable.\n  const PLANS = {\n    us_dealer:    { region: \"us\", currency: \"$\", unitLabel: \"Office\",  unitKey: \"office\", broker: 19, manager: 9, unit: 69, easySign: 269, vato: 99, web: 250, api: 199, live: 75 },\n    us_shipyard:  { region: \"us\", currency: \"$\", unitLabel: \"Brand\",   unitKey: \"brand\",  broker: 19, manager: 9, unit: 99, easySign: 269, vato: 99, web: 250, api: 199, live: 75 },\n    eu_dealer:    { region: \"eu\", currency: \"€\", unitLabel: \"Office\",  unitKey: \"office\", broker: 12, manager: 5, unit: 49, easySign: null, vato: 79, web: 209, api: 69, live: 60 },\n    eu_shipyard:  { region: \"eu\", currency: \"€\", unitLabel: \"Brand\",   unitKey: \"brand\",  broker: 12, manager: 5, unit: 69, easySign: null, vato: 79, web: 209, api: 69, live: 60 },\n  };\n\n  // Current selection\n  let region = 'us';\n  let persona = 'dealer';\n  let distribution = 'factory'; // 'factory' | 'dealer-network'  (shipyard only)\n  let dealerType = 'brokerage'; // 'brokerage' | 'authorized'  (dealer only)\n  let dealerState = '';        // US state code, e.g. 'FL'  (dealer only)\n  let brands = [];  // [{ name: 'Sanlorenzo' }, ...]  (shipyard only)\n  // Tooltip text for each add-on, surfaced via title= and our custom CSS popover.\n  const ADDON_TIPS = {\n    easySign: 'End-to-end digital deal management. Purchase agreements, listing agreements, commission docs, all sent for signing and tracked in one place. Manager approval, DocuSign-compatible.',\n    vato:     'Vessel Valuation Tool. Search any make, model, and year (or year range) anywhere in the world. See every listing from every major platform, plus market value benchmarked per country.',\n    web:      'Branded dealer website with live inventory sync. Modern, mobile-first, your logo and domain. Edit on YachtWay, the change appears on your site in seconds.',\n    api:      'YachtWay API feed. Pull inventory once, sync everywhere. Faster updates than BoatsGroup, cleaner data, your inventory stays yours.',\n    live:     'YachtWay LIVE. Stream the boat live from anywhere, buyers tune in from around the world. Reposted to YachtWay YouTube Hub channel (500K+ subs).'\n  };\n  const addonState = { easySign: false, vato: false, web: false, api: false, live: 0 };\n\n  const logoInput = $('logo-input');\n  const logoZone = $('logo-zone');\n  const logoPreview = $('logo-preview');\n  const logoName = $('logo-name');\n\n  // Website-rubric fields (dealer-only).\n  const screenshotInput = $('screenshot-input');\n  const screenshotZone  = $('screenshot-zone');\n  const screenshotPreview = $('screenshot-preview');\n  const screenshotName  = $('screenshot-name');\n  const websiteScoreEl  = $('website-score');\n  const imageQualityEl  = $('image-quality');\n  let websiteScore = 5;\n  let imageQuality = 5;\n  let websiteScreenshot = null;\n  let websiteScreenshotName = null;\n  let hasInventory = 'no';      // 'no' | 'yes'\n  let inventoryFeed = 'other';  // 'other' | 'boatsgroup'\n\n  const WS_LABELS = [\n    'Freezing', 'Freezing', 'Cold', 'Cold',\n    'Cool',     'Cool',     'Warm', 'Warm',\n    'Hot',      'Hot',      'Ultra Hot'\n  ];\n  const WS_DESCS = [\n    'No website at all, or just a one-pager with phone and email.',\n    'No website at all, or just a one-pager with phone and email.',\n    'Has a site, but no inventory feed. Just contact info. Looks dated.',\n    'Has a site, but no inventory feed. Just contact info. Looks dated.',\n    'Has a feed but feels dated, slow, or hard to navigate on mobile.',\n    'Has a feed but feels dated, slow, or hard to navigate on mobile.',\n    'Functional site, working feed, but average mobile and average UX.',\n    'Modern site with a working inventory feed. Decent mobile experience.',\n    'Modern site with a working inventory feed. Decent mobile experience.',\n    'Professional, fast, mobile-first. Clean buyer experience throughout.',\n    'Professional, fast, mobile-first. Clean buyer experience throughout.'\n  ];\n\n  const IQ_LABELS = [\n    'Very bad', 'Very bad', 'Bad', 'Poor',\n    'Decent',   'Decent',   'Good', 'Good',\n    'Great',    'Excellent','Studio quality'\n  ];\n  const IQ_DESCS = [\n    'Boat on a trailer, in a marina, covers still on.',\n    'Boat on a trailer, in a marina, covers still on.',\n    'Pixelated, low resolution, poorly lit interiors, fenders dangling.',\n    'Pixelated, low resolution, poorly lit interiors, fenders dangling.',\n    'In the open water, clearly amateur, but passable for a basic listing.',\n    'In the open water, clearly amateur, but passable for a basic listing.',\n    'Sharp, well-lit, mostly clean compositions.',\n    'Sharp, well-lit, mostly clean compositions.',\n    'Strong photography, considered angles and lighting.',\n    'Near-pro shoot, clean editing, well-staged interiors.',\n    'Full pro shoot, running shots, proper editing, well-staged interiors.'\n  ];\n\n  function setWebsiteScore(n) {\n    websiteScore = Math.max(0, Math.min(10, parseInt(n, 10) || 0));\n    websiteScoreEl.value = websiteScore;\n    $('ws-readout-num').textContent = websiteScore;\n    $('ws-readout').textContent     = WS_LABELS[websiteScore];\n    $('ws-desc').textContent        = WS_DESCS[websiteScore];\n    // Note: we intentionally do not surface whether the redesign slide will be\n    // included, do not want the sales person to score high to skip the work.\n  }\n\n  websiteScoreEl.addEventListener('input', () => setWebsiteScore(websiteScoreEl.value));\n\n  function setImageQuality(n) {\n    imageQuality = Math.max(0, Math.min(10, parseInt(n, 10) || 0));\n    imageQualityEl.value = imageQuality;\n    $('iq-readout-num').textContent = imageQuality;\n    $('iq-readout').textContent     = IQ_LABELS[imageQuality];\n    $('iq-desc').textContent        = IQ_DESCS[imageQuality];\n  }\n  imageQualityEl.addEventListener('input', () => setImageQuality(imageQualityEl.value));\n\n  // Inventory follow-up. The deck pitches an API feed when the dealer\n  // either has NO inventory on their site OR is currently piping in BoatsGroup\n  // (we want to displace BoatsGroup).\n  function renderInventoryUI() {\n    setSeg('seg-has-inv',  hasInventory);\n    setSeg('seg-inv-feed', inventoryFeed);\n    $('inv-feed-row').style.display = hasInventory === 'yes' ? 'flex' : 'none';\n    // Note: we intentionally do not surface whether the API-pitch slide will be\n    // included, do not want the sales person to short-circuit the question.\n  }\n  wireSeg('seg-has-inv',  (v) => { hasInventory  = v; renderInventoryUI(); });\n  wireSeg('seg-inv-feed', (v) => { inventoryFeed = v; renderInventoryUI(); });\n\n  // Screenshot upload (mirrors the logo flow).\n  function setScreenshotPreview(dataUrl, fileName) {\n    websiteScreenshot = dataUrl;\n    websiteScreenshotName = fileName || null;\n    if (dataUrl) {\n      screenshotPreview.innerHTML = '<img alt=\"Homepage screenshot\" src=\"' + dataUrl + '\" />';\n      screenshotZone.classList.add('has-file');\n      screenshotName.innerHTML = (fileName || 'screenshot') + ' <span style=\"color:#5fd398;font-weight:700;font-size:12px;\">· ATTACHED<\u002Fspan>';\n    } else {\n      screenshotPreview.innerHTML = '<span class=\"placeholder\">Site<\u002Fspan>';\n      screenshotZone.classList.remove('has-file');\n      screenshotName.innerHTML = 'Drop a homepage screenshot here <span style=\"color:#ff9b80;font-weight:700;font-size:12px;\">· MANDATORY<\u002Fspan>';\n    }\n  }\n\n  // Downscale + JPEG-compress a data URL to keep it under ~250KB so the\n  // entire config (logo + screenshot) still fits in 5MB localStorage.\n  async function compressDataUrl(dataUrl, opts) {\n    opts = opts || {};\n    const maxDim = opts.maxDim || 1400;\n    const quality = opts.quality || 0.78;\n    const img = new Image();\n    await new Promise((res, rej) => {\n      img.onload = res; img.onerror = rej; img.src = dataUrl;\n    });\n    let { width, height } = img;\n    const scale = Math.min(1, maxDim / Math.max(width, height));\n    width = Math.round(width * scale);\n    height = Math.round(height * scale);\n    const canvas = document.createElement('canvas');\n    canvas.width = width; canvas.height = height;\n    const ctx = canvas.getContext('2d');\n    ctx.drawImage(img, 0, 0, width, height);\n    return canvas.toDataURL('image/jpeg', quality);\n  }\n\n  screenshotInput.addEventListener('change', (e) => {\n    const file = e.target.files && e.target.files[0];\n    if (!file) return;\n    const reader = new FileReader();\n    reader.onload = async () => {\n      try {\n        // Compress before stashing in state so localStorage write later succeeds.\n        const compressed = await compressDataUrl(reader.result, { maxDim: 1400, quality: 0.78 });\n        setScreenshotPreview(compressed, file.name);\n      } catch (err) {\n        setScreenshotPreview(reader.result, file.name);\n      }\n    };\n    reader.readAsDataURL(file);\n  });\n\n  const fields = {\n    dealerName: $('dealer-name'),\n    dealerShort: $('dealer-short'),\n    attendeeFirst: $('attendee-first'),\n    attendeeLast:  $('attendee-last'),\n    presenterName: $('presenter-name'),\n    presenterTitle: $('presenter-title'),\n    coverLine: $('cover-line'),\n    dealerCount: $('dealer-count'),\n    priceBrokers: $('price-brokers'),\n    priceManagers: $('price-managers'),\n    priceUnits: $('price-units'),\n    centralListings: $('central-listings'),\n    websiteUrl: $('website-url'),\n  };\n\n  // ── Segmented control wiring\n  function wireSeg(elId, onChange) {\n    const root = $(elId);\n    root.addEventListener('click', (e) => {\n      const btn = e.target.closest('button[data-val]');\n      if (!btn) return;\n      root.querySelectorAll('button').forEach(b => b.setAttribute('aria-pressed', b === btn ? 'true' : 'false'));\n      onChange(btn.dataset.val);\n    });\n  }\n  // Swap state↔country options + label based on region.\n  const US_STATES = [\n    ['FL','Florida'],['CA','California'],['TX','Texas'],['NY','New York'],\n    ['CT','Connecticut'],['MA','Massachusetts'],['MD','Maryland'],['NJ','New Jersey'],\n    ['NC','North Carolina'],['SC','South Carolina'],['GA','Georgia'],['AL','Alabama'],\n    ['LA','Louisiana'],['TN','Tennessee'],['WA','Washington'],['OR','Oregon'],\n    ['AZ','Arizona'],['NV','Nevada'],['MI','Michigan'],['OTHER','Other US state'],\n  ];\n  const EU_COUNTRIES = [\n    ['IT','Italy'],['MC','Monaco'],['FR','France'],['ES','Spain'],['DE','Germany'],\n    ['NL','Netherlands'],['GR','Greece'],['HR','Croatia'],['MT','Malta'],['PT','Portugal'],\n    ['CH','Switzerland'],['AT','Austria'],['BE','Belgium'],['DK','Denmark'],['SE','Sweden'],\n    ['NO','Norway'],['FI','Finland'],['GB','United Kingdom'],['IE','Ireland'],['OTHER','Other EU country'],\n  ];\n  function renderLocationField() {\n    const sel = document.getElementById('dealer-state');\n    const lbl = document.getElementById('state-label');\n    const hint = document.getElementById('state-hint');\n    if (!sel) return;\n    const isEU = region === 'eu';\n    const list = isEU ? EU_COUNTRIES : US_STATES;\n    const prevValue = sel.value;\n    sel.innerHTML = '<option value=\"\">Select ' + (isEU ? 'country' : 'state') + '...<\u002Foption>' +\n      list.map(([code, name]) => '<option value=\"' + code + '\">' + name + '<\u002Foption>').join('');\n    // Preserve selection if still valid in the new list\n    if (list.some(([c]) => c === prevValue)) sel.value = prevValue;\n    else sel.value = '';\n    const audience = persona === 'shipyard' ? 'Shipyard' : 'Dealer';\n    lbl.innerHTML = audience + ' location · ' + (isEU ? 'country' : 'state') +\n      ' <span style=\"color:#ff9b80;font-weight:700;\">· MANDATORY<\u002Fspan>';\n    hint.textContent = isEU\n      ? ('For Europe we ask for the ' + audience.toLowerCase() + '\\u2019s country. The Studio pitch slide is US-only.')\n      : (persona === 'shipyard'\n          ? 'Shipyards get the Studio pitch slide regardless of state.'\n          : 'South Florida dealers get the YachtWay Studio pitch slide. Other states skip it.');\n  }\n\n  wireSeg('seg-region',  (v) => { region  = v; renderLocationField(); renderPersonaUI(); renderPricing(); });\n  wireSeg('seg-persona', (v) => { persona = v; renderLocationField(); renderPersonaUI(); renderDistributionUI(); renderPricing(); });\n  wireSeg('seg-distribution', (v) => { distribution = v; renderDistributionUI(); });\n  wireSeg('seg-dealer-type', (v) => { dealerType = v; renderPersonaUI(); });\n  // Track dealer-state changes; gates the Studio slide in the deck.\n  document.getElementById('dealer-state').addEventListener('change', (e) => {\n    dealerState = e.target.value;\n  });\n\n  function renderPersonaUI() {\n    const isShipyard = persona === 'shipyard';\n    const isAuthDealer = persona === 'dealer' && dealerType === 'authorized';\n    const showBrands = isShipyard || isAuthDealer;\n    $('website-field').style.display = isShipyard ? 'none' : 'block';\n    $('central-listings-field').style.display = isShipyard ? 'none' : 'block';\n    $('image-quality-field').style.display    = isShipyard ? 'none' : 'block';\n    $('shipyard-fields').style.display = isShipyard ? 'block' : 'none';\n    $('dealer-fields').style.display   = isShipyard ? 'none' : 'block';\n\n    // For shipyards, swap the units count input for a named-brand list.\n    // For authorized dealers, keep the offices count AND show the brand list.\n    $('units-cell').style.display = isShipyard ? 'none' : 'block';\n    $('brand-list-wrap').style.display = showBrands ? 'block' : 'none';\n    $('team-row').style.gridTemplateColumns = '';\n\n    // Relabel the brand-count question to match the audience.\n    const brandLabel = $('brand-count-label');\n    if (brandLabel) {\n      brandLabel.textContent = isShipyard\n        ? 'How many brands?'\n        : 'How many brands do you represent?';\n    }\n\n    if (showBrands) {\n      $('brand-count').value = brands.length || '';\n      renderBrandList();\n    }\n    $('unit-label').textContent = isShipyard ? 'Team' : 'Team & sites';\n\n    // Relabel the dealer-centric copy when this is a shipyard pitch.\n    $('card-title').textContent       = isShipyard ? 'Shipyard details' : 'Dealer / Brokerage details';\n    // Keep label copy persona-aware. The MANDATORY marker is preserved in markup\n    // because we only swap the leading copy here.\n    $('logo-label').innerHTML       = (isShipyard\n      ? 'Shipyard logo · white on transparent · SVG or PNG'\n      : 'Dealer logo · white on transparent · SVG or PNG'\n      ) + ' <span style=\"color:#ff9b80;font-weight:700;\">· MANDATORY<\u002Fspan>';\n    $('name-label').innerHTML       = (isShipyard ? 'Shipyard name' : 'Dealer name') +\n      ' <span style=\"color:#ff9b80;font-weight:700;\">· MANDATORY<\u002Fspan>';\n    fields.dealerName.placeholder     = isShipyard ? 'Sanlorenzo' : 'QWERTY Yachts';\n\n    if (isShipyard) {\n      renderDistributionUI();\n      renderBrandList();\n    }\n  }\n\n  function renderBrandList() {\n    const wrap = $('brand-list');\n    wrap.innerHTML = brands.map((b, i) =>\n      '<div class=\"brand-row\">' +\n        '<span class=\"idx\">' + String(i + 1).padStart(2, '0') + '<\u002Fspan>' +\n        '<input type=\"text\" placeholder=\"Brand name (e.g. Sanlorenzo)\" data-i=\"' + i + '\" value=\"' + (b.name || '').replace(/\"/g, '&quot;') + '\" />' +\n      '<\u002Fdiv>'\n    ).join('');\n    wrap.querySelectorAll('input').forEach(el => {\n      el.addEventListener('input', () => {\n        brands[+el.dataset.i].name = el.value;\n        renderPricing();\n      });\n    });\n  }\n\n  function setBrandCount(n) {\n    n = Math.max(0, Math.min(10, n || 0));\n    if (n > brands.length) {\n      while (brands.length < n) brands.push({ name: '' });\n    } else if (n < brands.length) {\n      brands.length = n;\n    }\n    $('brand-count').value = n || '';\n    renderBrandList();\n    renderPricing();\n  }\n\n  $('brand-count').addEventListener('input', () => {\n    const n = parseInt($('brand-count').value, 10);\n    setBrandCount(isNaN(n) ? 0 : n);\n  });\n  $('brand-minus').addEventListener('click', () => {\n    setBrandCount((brands.length || 0) - 1);\n  });\n  $('brand-plus').addEventListener('click', () => {\n    setBrandCount((brands.length || 0) + 1);\n  });\n\n  function renderDistributionUI() {\n    const showCount = persona === 'shipyard' && distribution === 'dealer-network';\n    $('dealers-row').style.display = showCount ? 'block' : 'none';\n    // Shipyards going through a dealer network do not have their own brokers/managers;\n    // hide those team fields so the sales person only enters dealer count.\n    const brokersCell = document.querySelector('#team-row > .num-cell:nth-child(1)');\n    const managersCell = document.querySelector('#team-row > .num-cell:nth-child(2)');\n    const hideTeam = showCount;\n    if (brokersCell)  brokersCell.style.display = hideTeam ? 'none' : '';\n    if (managersCell) managersCell.style.display = hideTeam ? 'none' : '';\n  }\n\n  function setSeg(elId, val) {\n    const root = $(elId);\n    root.querySelectorAll('button').forEach(b => b.setAttribute('aria-pressed', b.dataset.val === val ? 'true' : 'false'));\n  }\n\n  // ── Pricing render\n  const fmt = (cur, n) => cur + (n || 0).toLocaleString('en-US');\n\n  function planKey() { return region + '_' + persona; }\n\n  function renderPricing() {\n    const plan = PLANS[planKey()];\n    const cur = plan.currency;\n    const brokers  = parseInt(fields.priceBrokers.value, 10) || 0;\n    const managers = parseInt(fields.priceManagers.value, 10) || 0;\n    const isShipyard = persona === 'shipyard';\n    // Shipyards count NAMED brand entries; dealers use the offices input.\n    const namedBrands = brands.filter(b => (b.name || '').trim()).length;\n    const units = isShipyard ? namedBrands : (parseInt(fields.priceUnits.value, 10) || 0);\n\n    // Update placeholders/labels to reflect persona\n    if (!isShipyard) {\n      $('units-label').textContent = plan.unitLabel + 's';\n    }\n\n    const lines = [];\n    if (brokers > 0)  lines.push({ name: 'Broker seats',  qty: brokers + ' × ' + fmt(cur, plan.broker),  amt: brokers * plan.broker });\n    if (managers > 0) lines.push({ name: 'Manager seats', qty: managers + ' × ' + fmt(cur, plan.manager), amt: managers * plan.manager });\n    if (units > 0)    lines.push({ name: plan.unitLabel + (units === 1 ? '' : 's'), qty: units + ' × ' + fmt(cur, plan.unit), amt: units * plan.unit });\n\n    // Add-ons\n    // Dealer Website is dealer-only, shipyards do not get this line.\n    const addOns = [\n      { k: 'easySign', label: 'EasySign · digital contracts',    price: plan.easySign, unit: '/mo' },\n      { k: 'vato',     label: 'VATO · vessel valuation',         price: plan.vato,     unit: '/mo' },\n      ...(isShipyard ? [] : [{ k: 'web', label: 'Dealer Website + inventory sync', price: plan.web, unit: '/mo' }]),\n      { k: 'api',      label: 'API access',                      price: plan.api,      unit: '/mo' },\n    ];\n    addOns.forEach(a => {\n      if (a.price != null && addonState[a.k]) {\n        lines.push({ name: a.label.split(' · ')[0], qty: fmt(cur, a.price) + a.unit, amt: a.price });\n      }\n    });\n    if (addonState.live > 0 && plan.live != null) {\n      const streamsBilled = Math.max(0, addonState.live - 2); // first 2 streams free\n      lines.push({ name: 'YachtWay LIVE',\n                   qty: addonState.live + ' streams · 2 free, ' + streamsBilled + ' × ' + fmt(cur, plan.live),\n                   amt: streamsBilled * plan.live });\n    }\n\n    const total = lines.reduce((s, l) => s + l.amt, 0);\n\n    // Render lines\n    const linesEl = $('price-lines');\n    if (!lines.length) {\n      linesEl.innerHTML = '<div class=\"line muted\"><span class=\"name\">Add seats, offices, or add-ons to see a breakdown<\u002Fspan><span class=\"qty\"><\u002Fspan><span class=\"amt\">-<\u002Fspan><\u002Fdiv>';\n    } else {\n      linesEl.innerHTML = lines.map(l =>\n        '<div class=\"line\"><span class=\"name\">' + l.name + '<\u002Fspan>' +\n        '<span class=\"qty\">' + l.qty + '<\u002Fspan>' +\n        '<span class=\"amt\">' + fmt(cur, l.amt) + '<\u002Fspan><\u002Fdiv>'\n      ).join('');\n    }\n\n    $('price-total').innerHTML = fmt(cur, total) + '<span class=\"per\">/mo<\u002Fspan>';\n    $('price-annual').textContent = fmt(cur, total * 12) + ' / year';\n    $('price-region').textContent = region === 'us' ? 'United States' : 'Europe';\n    $('price-persona').textContent = persona === 'shipyard' ? 'Shipyard' : 'Dealership / Brokerage';\n\n    renderAddons(plan);\n  }\n\n  function renderAddons(plan) {\n    const cur = plan.currency;\n    const isShipyard = persona === 'shipyard';\n    const addons = [\n      { k: 'easySign', label: 'EasySign',       price: plan.easySign, unit: '/mo' },\n      { k: 'vato',     label: 'VATO',           price: plan.vato,     unit: '/mo' },\n      ...(isShipyard ? [] : [{ k: 'web', label: 'Dealer Website', price: plan.web, unit: '/mo' }]),\n      { k: 'api',      label: 'API access',     price: plan.api,     unit: '/mo' },\n    ];\n    const html = addons.map(a => {\n      const unavailable = a.price == null;\n      const on = !unavailable && addonState[a.k];\n      const priceLabel = unavailable ? 'not in region' : fmt(cur, a.price) + a.unit;\n      const tip = ADDON_TIPS[a.k] || '';\n      const tipMarkup = tip ?\n        '<span class=\"info-i\" data-tip=\"' + tip.replace(/\"/g, '&quot;') + '\">i<\u002Fspan>' : '';\n      return '<label class=\"addon ' + (on ? 'on ' : '') + (unavailable ? 'unavailable' : '') + '\" data-k=\"' + a.k + '\"' + (tip ? ' title=\"' + tip.replace(/\"/g, '&quot;') + '\"' : '') + '>' +\n        '<span class=\"dot\"><\u002Fspan>' +\n        '<span>' + a.label + '<\u002Fspan>' +\n        tipMarkup +\n        '<span class=\"price\">' + priceLabel + '<\u002Fspan>' +\n      '<\u002Flabel>';\n    }).join('') +\n      // LIVE streams as a small number input, first 2 free\n      '<label class=\"addon ' + (addonState.live > 0 && plan.live != null ? 'on ' : '') + (plan.live == null ? 'unavailable' : '') + '\" style=\"grid-column: span 2;\" title=\"' + (ADDON_TIPS.live || '').replace(/\"/g, '&quot;') + '\">' +\n        '<span class=\"dot\"><\u002Fspan>' +\n        '<span>YachtWay LIVE<\u002Fspan>' +\n        '<input type=\"number\" min=\"0\" max=\"50\" value=\"' + addonState.live + '\" id=\"live-count\" ' + (plan.live == null ? 'disabled' : '') + ' style=\"width:64px;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.15);border-radius:6px;color:#fff;padding:4px 8px;font-size:13px;font-family:inherit;text-align:right;\" />' +\n        '<span class=\"price\">' + (plan.live != null ? fmt(cur, plan.live) + '/stream' : 'not in region') + '<\u002Fspan>' +\n      '<\u002Flabel>';\n    $('addons').innerHTML = html;\n\n    // Wire toggles\n    $('addons').querySelectorAll('.addon[data-k]').forEach(el => {\n      el.addEventListener('click', (e) => {\n        if (el.classList.contains('unavailable')) return;\n        const k = el.dataset.k;\n        addonState[k] = !addonState[k];\n        renderPricing();\n      });\n    });\n    const liveEl = document.getElementById('live-count');\n    if (liveEl) {\n      liveEl.addEventListener('click', (e) => e.stopPropagation());\n      liveEl.addEventListener('input', () => {\n        addonState.live = Math.max(0, parseInt(liveEl.value, 10) || 0);\n        renderPricing();\n      });\n      // Click on the LIVE row (outside the number input) toggles the number\n      // between 0 and 1. Without this, the row felt \"dead\" — there was no way\n      // to turn LIVE on without first typing a number into the small input.\n      const liveLabel = liveEl.closest('label.addon');\n      if (liveLabel) {\n        liveLabel.addEventListener('click', (e) => {\n          if (e.target === liveEl || liveLabel.classList.contains('unavailable')) return;\n          addonState.live = addonState.live > 0 ? 0 : 1;\n          renderPricing();\n        });\n      }\n    }\n  }\n\n  // Recompute when team inputs change\n  ['priceBrokers', 'priceManagers', 'priceUnits'].forEach(k => {\n    fields[k].addEventListener('input', renderPricing);\n  });\n\n  // Wire +/− stepper buttons for the team-row number cells.\n  document.querySelectorAll('button.step-btn[data-step]').forEach(btn => {\n    btn.addEventListener('click', () => {\n      const el = document.getElementById(btn.dataset.step);\n      if (!el) return;\n      const cur = parseInt(el.value, 10) || 0;\n      const dir = parseInt(btn.dataset.dir, 10) || 1;\n      el.value = Math.max(0, cur + dir);\n      el.dispatchEvent(new Event('input', { bubbles: true }));\n    });\n  });\n\n  let logoData = null; // data URL\n  let logoFileName = null;\n  let logoInvert = false;\n\n  function setLogoPreview(dataUrl, fileName, isDark) {\n    logoData = dataUrl;\n    logoFileName = fileName;\n    logoInvert = !!isDark;\n    if (dataUrl) {\n      const filterStyle = isDark ? 'filter: brightness(0) invert(1);' : '';\n      logoPreview.innerHTML = '<img src=\"' + dataUrl + '\" alt=\"Logo\" style=\"' + filterStyle + '\" />';\n      logoName.textContent = (fileName || 'Logo loaded') + (isDark ? ' · auto-inverted to white' : '');\n      logoName.classList.remove('empty');\n      logoZone.classList.add('has-file');\n    } else {\n      logoPreview.innerHTML = '<span class=\"placeholder\">Logo<\u002Fspan>';\n      logoName.textContent = 'Click or drop a file…';\n      logoName.classList.add('empty');\n      logoZone.classList.remove('has-file');\n    }\n  }\n\n  logoInput.addEventListener('change', (e) => {\n    const file = e.target.files && e.target.files[0];\n    if (!file) return;\n    const reader = new FileReader();\n    reader.onload = () => {\n      const dataUrl = reader.result;\n      // Detect if the logo is predominantly dark; if so, mark for inversion when shown on dark backgrounds.\n      detectDark(dataUrl, file.type, (isDark) => {\n        setLogoPreview(dataUrl, file.name, isDark);\n      });\n    };\n    reader.readAsDataURL(file);\n  });\n\n  function detectDark(dataUrl, mime, cb) {\n    const img = new Image();\n    img.crossOrigin = 'anonymous';\n    img.onload = () => {\n      try {\n        const w = Math.min(img.naturalWidth || 256, 256);\n        const h = Math.min(img.naturalHeight || 256, 256);\n        const cv = document.createElement('canvas');\n        cv.width = w; cv.height = h;\n        const ctx = cv.getContext('2d');\n        ctx.drawImage(img, 0, 0, w, h);\n        const data = ctx.getImageData(0, 0, w, h).data;\n        let sum = 0, count = 0;\n        for (let i = 0; i < data.length; i += 4) {\n          const a = data[i + 3];\n          if (a < 32) continue; // skip transparent\n          // Perceived brightness\n          const lum = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];\n          sum += lum;\n          count++;\n        }\n        if (count === 0) return cb(false);\n        const avg = sum / count;\n        cb(avg < 90); // dark threshold\n      } catch (err) {\n        cb(false);\n      }\n    };\n    img.onerror = () => cb(false);\n    img.src = dataUrl;\n  }\n\n  // Auto-derive dealer-short from dealer-name first word.\n  fields.dealerName.addEventListener('input', () => {\n    const first = fields.dealerName.value.trim().split(/\\s+/)[0] || '';\n    fields.dealerShort.value = first;\n  });\n\n  // Live counter on the pitch-line input.\n  function updateCoverCounter() {\n    const el = $('cover-line-counter');\n    if (el) el.textContent = (fields.coverLine.value.length) + ' / 80';\n  }\n  fields.coverLine.addEventListener('input', updateCoverCounter);\n\n  function collectConfig() {\n    const plan = PLANS[planKey()];\n    const cur = plan.currency;\n    const brokers  = parseInt(fields.priceBrokers.value, 10) || 0;\n    const managers = parseInt(fields.priceManagers.value, 10) || 0;\n    const isShipyard = persona === 'shipyard';\n    const isAuthDealer = persona === 'dealer' && dealerType === 'authorized';\n    const showBrands = isShipyard || isAuthDealer;\n    const namedBrands = brands.filter(b => (b.name || '').trim()).map(b => ({ name: b.name.trim() }));\n    const units = isShipyard ? namedBrands.length : (parseInt(fields.priceUnits.value, 10) || 0);\n    const livePaid = Math.max(0, addonState.live - 2);\n    const monthly =\n      brokers  * plan.broker  +\n      managers * plan.manager +\n      units    * plan.unit    +\n      (addonState.easySign && plan.easySign != null ? plan.easySign : 0) +\n      (addonState.vato     && plan.vato     != null ? plan.vato     : 0) +\n      (!isShipyard && addonState.web && plan.web != null ? plan.web : 0) +\n      (addonState.api      && plan.api      != null ? plan.api      : 0) +\n      (plan.live != null ? livePaid * plan.live : 0);\n\n    return {\n      dealerName: fields.dealerName.value.trim(),\n      dealerShort: fields.dealerShort.value.trim() || (fields.dealerName.value.trim().split(/\\s+/)[0] || ''),\n      attendeeFirst: fields.attendeeFirst.value.trim(),\n      attendeeLast:  fields.attendeeLast.value.trim(),\n      attendeeName:  (fields.attendeeFirst.value.trim() + ' ' + fields.attendeeLast.value.trim()).trim(),\n      presenterName: fields.presenterName.value.trim(),\n      presenterTitle: fields.presenterTitle.value.trim(),\n      coverHeadline: {\n        line: fields.coverLine.value.trim(),\n      },\n      // Footprint mirrors the pricing inputs so the deck stays in sync.\n      brokers: parseInt(fields.priceBrokers.value, 10) || null,\n      locations: parseInt(fields.priceUnits.value, 10) || null,\n      listings: persona === 'dealer' ? (parseInt(fields.centralListings.value, 10) || null) : null,\n      centralListings: persona === 'dealer' ? (parseInt(fields.centralListings.value, 10) || null) : null,\n      logoData: logoData,\n      logoFileName: logoFileName,\n      logoInvert: logoInvert,\n      websiteScore: persona === 'dealer' ? websiteScore : null,\n      websiteUrl: persona === 'dealer' ? fields.websiteUrl.value.trim() : null,\n      imageQuality: persona === 'dealer' ? imageQuality : null,\n      websiteScreenshot:     persona === 'dealer' ? websiteScreenshot     : null,\n      websiteScreenshotName: persona === 'dealer' ? websiteScreenshotName : null,\n      hasInventory:  persona === 'dealer' ? hasInventory  : null,\n      inventoryFeed: persona === 'dealer' && hasInventory === 'yes' ? inventoryFeed : null,\n      region: region,\n      persona: persona,\n      distribution: persona === 'shipyard' ? distribution : null,\n      dealerType:   persona === 'dealer'   ? dealerType   : null,\n      dealerState:  persona === 'dealer'   ? dealerState  : null,\n      dealerCount: persona === 'shipyard' && distribution === 'dealer-network'\n                     ? (parseInt(fields.dealerCount.value, 10) || null)\n                     : null,\n      pricing: {\n        currency: cur,\n        regionLabel: region === 'us' ? 'United States' : 'Europe',\n        personaLabel: persona === 'shipyard' ? 'Shipyard' : 'Dealership / Brokerage',\n        brokers: brokers,\n        managers: managers,\n        units: units,\n        unitLabel: plan.unitLabel,\n        brands: showBrands ? namedBrands : null,\n        addons: { ...addonState },\n        monthly: monthly,\n        annual: monthly * 12,\n      },\n      ts: Date.now(),\n    };\n  }\n\n  function applyConfig(cfg) {\n    fields.dealerName.value = cfg.dealerName || '';\n    fields.dealerShort.value = cfg.dealerShort || '';\n    fields.attendeeFirst.value = cfg.attendeeFirst || '';\n    fields.attendeeLast.value  = cfg.attendeeLast  || '';\n    fields.presenterName.value = cfg.presenterName || '';\n    fields.presenterTitle.value = cfg.presenterTitle || '';\n    fields.coverLine.value = (cfg.coverHeadline && (cfg.coverHeadline.line || cfg.coverHeadline.highlight || cfg.coverHeadline.line1)) || '';\n    updateCoverCounter();\n    // Back-compat: older configs stored \"Name · Title\" in presenterName.\n    if (!cfg.presenterTitle && cfg.presenterName && cfg.presenterName.includes(' · ')) {\n      const [nm, ...rest] = cfg.presenterName.split(' · ');\n      fields.presenterName.value = nm.trim();\n      fields.presenterTitle.value = rest.join(' · ').trim();\n    }\n    if (cfg.logoData) setLogoPreview(cfg.logoData, cfg.logoFileName, cfg.logoInvert);\n    else setLogoPreview(null);\n\n    setWebsiteScore(cfg.websiteScore != null ? cfg.websiteScore : 5);\n    fields.websiteUrl.value = cfg.websiteUrl || '';\n    setImageQuality(cfg.imageQuality != null ? cfg.imageQuality : 5);\n    setScreenshotPreview(cfg.websiteScreenshot || null, cfg.websiteScreenshotName || null);\n    fields.centralListings.value = cfg.centralListings || cfg.listings || '';\n    hasInventory  = cfg.hasInventory  || 'no';\n    inventoryFeed = cfg.inventoryFeed || 'other';\n    renderInventoryUI();\n\n    region = cfg.region || 'us';\n    persona = cfg.persona || 'dealer';\n    distribution = cfg.distribution || 'factory';\n    dealerType   = cfg.dealerType   || 'brokerage';\n    dealerState  = cfg.dealerState  || '';\n    setSeg('seg-region', region);\n    renderLocationField();\n    setSeg('seg-persona', persona);\n    setSeg('seg-distribution', distribution);\n    setSeg('seg-dealer-type', dealerType);\n    const stateSel = document.getElementById('dealer-state');\n    if (stateSel) stateSel.value = dealerState;\n    fields.dealerCount.value = cfg.dealerCount || '';\n    renderPersonaUI();\n    renderDistributionUI();\n    if (cfg.pricing) {\n      fields.priceBrokers.value  = cfg.pricing.brokers  || '';\n      fields.priceManagers.value = cfg.pricing.managers || '';\n      fields.priceUnits.value    = cfg.pricing.units    || '';\n      brands = Array.isArray(cfg.pricing.brands) && cfg.pricing.brands.length\n               ? cfg.pricing.brands.map(b => ({ name: b.name || '' }))\n               : [];\n      Object.assign(addonState, cfg.pricing.addons || {});\n    } else {\n      // Back-compat: older configs only had brokers/locations on the root.\n      if (cfg.brokers)   fields.priceBrokers.value = cfg.brokers;\n      if (cfg.locations) fields.priceUnits.value   = cfg.locations;\n    }\n    renderPricing();\n  }\n\n  // Run all the mandatory-field checks. Returns the config if valid,\n  // false otherwise (and flashes the offending field).\n  function validateAndCollect() {\n    const cfg = collectConfig();\n    if (!cfg.dealerName) {\n      fields.dealerName.focus();\n      fields.dealerName.style.borderColor = '#ff7a59';\n      setTimeout(() => fields.dealerName.style.borderColor = '', 1500);\n      return false;\n    }\n    if (!cfg.attendeeFirst || !cfg.attendeeLast) {\n      const miss = !cfg.attendeeFirst ? fields.attendeeFirst : fields.attendeeLast;\n      miss.focus();\n      fields.attendeeFirst.style.borderColor = '#ff7a59';\n      fields.attendeeLast.style.borderColor  = '#ff7a59';\n      setTimeout(() => {\n        fields.attendeeFirst.style.borderColor = '';\n        fields.attendeeLast.style.borderColor  = '';\n      }, 1500);\n      return false;\n    }\n    if (!cfg.presenterName || !cfg.presenterTitle) {\n      const miss = !cfg.presenterName ? fields.presenterName : fields.presenterTitle;\n      miss.focus();\n      fields.presenterName.style.borderColor = '#ff7a59';\n      fields.presenterTitle.style.borderColor = '#ff7a59';\n      setTimeout(() => {\n        fields.presenterName.style.borderColor = '';\n        fields.presenterTitle.style.borderColor = '';\n      }, 1500);\n      return false;\n    }\n    if (!cfg.logoData) {\n      logoZone.scrollIntoView({ block: 'center', behavior: 'smooth' });\n      logoZone.style.borderColor = '#ff7a59';\n      setTimeout(() => logoZone.style.borderColor = '', 1500);\n      return false;\n    }\n    if (persona === 'dealer' && !cfg.websiteScreenshot) {\n      screenshotZone.scrollIntoView({ block: 'center', behavior: 'smooth' });\n      screenshotZone.style.borderColor = '#ff7a59';\n      setTimeout(() => screenshotZone.style.borderColor = '', 1500);\n      return false;\n    }\n    if (persona === 'dealer' && !cfg.centralListings) {\n      fields.centralListings.scrollIntoView({ block: 'center', behavior: 'smooth' });\n      fields.centralListings.focus();\n      fields.centralListings.style.borderColor = '#ff7a59';\n      setTimeout(() => fields.centralListings.style.borderColor = '', 1500);\n      return false;\n    }\n    return cfg;\n  }\n\n  // Compress JSON, encode for URL (~base64url). Used by Copy Share Link.\n  async function encodeCfgToHash(cfg) {\n    const json = JSON.stringify(cfg);\n    const stream = new Blob([json]).stream().pipeThrough(new CompressionStream('gzip'));\n    const buf = await new Response(stream).arrayBuffer();\n    let bin = '';\n    const bytes = new Uint8Array(buf);\n    for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);\n    // base64url\n    return btoa(bin).replace(/\\+/g, '-').replace(/\\//g, '_').replace(/=+$/, '');\n  }\n\n  function saveAndOpen(target, extraQuery) {\n    const cfg = validateAndCollect();\n    if (!cfg) return;\n    try {\n      localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg));\n    } catch (e) {\n      alert('Could not save config (storage full?). Logo may be too large.');\n      return;\n    }\n    saveToHistory(cfg);\n    // Preserve preview platform auth (token in query/hash).\n    const url = target +\n      (window.location.search || '') +\n      (extraQuery ? (window.location.search ? '&' : '?') + extraQuery : '') +\n      (window.location.hash || '');\n    // Open the deck in a new tab so the sales person does not lose this\n    // config screen — they can come back and tweak fields without re-entering.\n    // Same-tab nav inherits the preview platform's auth cookie.\n    // Opening _blank can drop the session (\"preview token required\").\n    window.location.href = url;\n  }\n\n  // Copy a shareable link that carries the entire personalized config\n  // in the URL hash. Useful when the salesperson wants to prepare today\n  // and open the same deck tomorrow on any device.\n  async function copyShareLink() {\n    const cfg = validateAndCollect();\n    if (!cfg) return;\n    const fb = $('link-feedback');\n    fb.textContent = 'Building link...';\n    fb.style.color = 'rgba(255,255,255,.5)';\n    try {\n      const encoded = await encodeCfgToHash(cfg);\n      const base = window.location.href.replace(/[^/]*$/, '') + 'YachtWay Deck.html';\n      const link = base + '#cfg=' + encoded;\n      const sizeKB = Math.round(link.length / 1024);\n      await navigator.clipboard.writeText(link);\n      fb.textContent = '\\u2713 Copied. ' + sizeKB + ' KB' + (sizeKB > 100 ? ' \\u00b7 large (logo/screenshot embedded)' : '');\n      fb.style.color = '#5fd398';\n      setTimeout(() => { fb.textContent = ''; }, 6000);\n    } catch (e) {\n      fb.textContent = 'Could not copy link. ' + (e && e.message ? e.message : '');\n      fb.style.color = '#ff9b80';\n    }\n  }\n\n  function saveToHistory(cfg) {\n    if (!cfg.dealerName) return;\n    try {\n      const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');\n      // Dedupe by dealerName\n      const filtered = history.filter(h => h.dealerName !== cfg.dealerName);\n      filtered.unshift(cfg);\n      // Cap at 6\n      localStorage.setItem(HISTORY_KEY, JSON.stringify(filtered.slice(0, 6)));\n      renderPresets();\n    } catch (e) {}\n  }\n\n  function renderPresets() {\n    const list = $('preset-list');\n    if (!list) return; // preset UI was removed\n    list.innerHTML = '';\n    try {\n      const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');\n      if (!history.length) {\n        list.innerHTML = '<span style=\"color:rgba(255,255,255,.3);font-size:13px;\">No saved dealers yet.<\u002Fspan>';\n        return;\n      }\n      history.forEach((h, i) => {\n        const pill = document.createElement('span');\n        pill.className = 'preset-pill';\n        pill.innerHTML = h.dealerName + '<span class=\"x\" data-idx=\"' + i + '\">×<\u002Fspan>';\n        pill.addEventListener('click', (e) => {\n          if (e.target.classList.contains('x')) return;\n          applyConfig(h);\n        });\n        const xBtn = pill.querySelector('.x');\n        xBtn.addEventListener('click', (e) => {\n          e.stopPropagation();\n          const idx = parseInt(xBtn.getAttribute('data-idx'), 10);\n          const arr = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');\n          arr.splice(idx, 1);\n          localStorage.setItem(HISTORY_KEY, JSON.stringify(arr));\n          renderPresets();\n        });\n        list.appendChild(pill);\n      });\n    } catch (e) {}\n  }\n\n  $('open-deck').addEventListener('click', () => saveAndOpen('YachtWay Deck.html'));\n  $('save-pdf').addEventListener('click', () => saveAndOpen('YachtWay Deck.html', 'autoprint=1'));\n  $('copy-link').addEventListener('click', () => copyShareLink());\n\n  // Initial render of addons + pricing\n  renderPersonaUI();\n  renderDistributionUI();\n  renderPricing();\n\n  // Initial state, always start blank. Saved presets live in the\n  // \"Recent\" pills below; clicking one restores it. Avoids leaking the\n  // last presenter's name/logo into a fresh pitch.\n  applyConfig({});\n\n  renderPresets();\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
